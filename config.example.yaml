# Copy to config.yaml and fill in the two required fields below.
# config.yaml is gitignored - safe for API keys.
#
# Quick path:
#   1. cp config.example.yaml config.yaml
#   2. Set output.dir (Obsidian folder, or ./output/transcripts to try it out)
#   3. Set secrets.assemblyai_api_key from https://www.assemblyai.com/dashboard
#   4. python scripts/pipeline.py run --limit 1
#
# Defaults you get without editing anything else:
#   - transcription.provider: assemblyai (fast cloud + speaker labels)
#   - sync.delete_after_transcribe: true (removes file from device after success)

output:
  dir: ./output/transcripts

secrets:
  assemblyai_api_key: ""

# --- Optional: only if you switch away from AssemblyAI ---
#
# Local Whisper + pyannote (slow on CPU — install requirements-local.txt first):
#   transcription:
#     provider: local
#   secrets:
#     hf_token: ""   # accept https://huggingface.co/pyannote/speaker-diarization-community-1
#
# Self-hosted GPU worker on another machine:
#   transcription:
#     provider: remote
#     remote_url: http://192.168.1.50:8765
#     remote_token: ""
#
# HiNotes cloud pull (scripts/sync_transcripts.py):
#   secrets:
#     hinotes_token: ""
