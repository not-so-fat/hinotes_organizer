# Copy to config.yaml and fill in the values below.
# config.yaml is gitignored — safe for tokens.

output:
  dir: /path/to/your/Obsidian/Transcripts/HiDock

secrets:
  # Required for speaker labels (pyannote). Get one at https://huggingface.co/settings/tokens
  # and accept https://huggingface.co/pyannote/speaker-diarization-community-1
  hf_token: ""

  # Optional — only if you use scripts/sync_transcripts.py (HiNotes cloud pull)
  # Chrome → hinotes.hidock.com → Console → localStorage.getItem('accessToken')
  # hinotes_token: ""

# Everything below has sensible defaults; uncomment only if needed.
#
# transcription:
#   model: medium
#   diarize: true
#
# markdown:
#   save_segments_json: true
